  }

const tabs = document.getElementById('tabs');
const cardArea = document.getElementById('card-area');
let active = 0;

function render(i) {
  active = i;
  const s = steps[i];
  tabs.querySelectorAll('.tab-btn').forEach((b, idx) => {
    b.className = 'tab-btn' + (idx === i ? ' active' : '');
  });
  cardArea.innerHTML = `
    <div class="prompt-card">
      <span class="step-badge" style="${s.badgeColor}">${s.badge}</span>
      <p class="step-title">${s.label} — ${s.title}</p>
      <p class="step-desc">${s.desc}</p>
      <div class="prompt-box" id="pb">${s.prompt}</div>
      <button class="copy-btn" id="cpbtn" onclick="copyPrompt()">
        <i class="ti ti-copy" aria-hidden="true"></i> 프롬프트 복사
      </button>
    </div>
  `;
}

steps.forEach((s, i) => {
  const b = document.createElement('button');
  b.className = 'tab-btn' + (i === 0 ? ' active' : '');
  b.textContent = s.label;
  b.onclick = () => render(i);
  tabs.appendChild(b);
});

render(0);

function copyPrompt() {
  const text = steps[active].prompt;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('cpbtn');
    btn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> 복사됨';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '<i class="ti ti-copy" aria-hidden="true"></i> 프롬프트 복사';
      btn.classList.remove('copied');
    }, 2000);
  });
}
